name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          # bundler-cache kullanılmıyor; ruby2d SDL2 native bağımlılığı
          # gerektirdiğinden CI ortamında install edilemez.
          # Testler ruby2d gerektirmiyor, gem'i atlıyoruz.
          bundler-cache: false

      - name: Install CI gems (ruby2d hariç)
        run: |
          gem install bundler --no-document
          bundle config set --local without 'default'
          # Sadece minitest ve rake'i kur; ruby2d'yi atla
          gem install rake minitest json --no-document

      - name: Syntax check
        run: |
          ruby -c main.rb
          find src -name '*.rb' -print0 | xargs -0 -n1 ruby -c

      - name: Tests
        run: |
          ruby -I src -I test -e \
            "Dir.glob('test/**/*_test.rb').sort.each { |f| load f }"
